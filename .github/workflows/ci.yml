name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # nightly multi-db + containerized

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run unit + integration tests (SQLite)
        working-directory: backend
        run: python -m pytest tests/ -x -m "not containerized"

  backend-multidb:
    runs-on: ubuntu-latest
    needs: backend
    strategy:
      fail-fast: false
      matrix:
        dialect: [postgresql, mysql]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cassini
          POSTGRES_PASSWORD: cassini
          POSTGRES_DB: cassini_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cassini"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: cassini
          MYSQL_USER: cassini
          MYSQL_PASSWORD: cassini
          MYSQL_DATABASE: cassini_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -ucassini -pcassini"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Set DB URL
        id: dburl
        run: |
          case "${{ matrix.dialect }}" in
            postgresql) echo "url=postgresql+asyncpg://cassini:cassini@localhost:5432/cassini_test" >> $GITHUB_OUTPUT ;;
            mysql)      echo "url=mysql+aiomysql://cassini:cassini@localhost:3306/cassini_test"      >> $GITHUB_OUTPUT ;;
          esac
      - name: Run integration tests against ${{ matrix.dialect }}
        working-directory: backend
        env:
          CASSINI_DATABASE_URL: ${{ steps.dburl.outputs.url }}
        run: python -m pytest tests/integration/ -x -m "not containerized"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Seed E2E DB
        working-directory: backend
        env:
          CASSINI_DATABASE_URL: 'sqlite+aiosqlite:///./test-e2e.db'
        run: python -m cassini.scripts.seed_e2e_unified --db-url "$CASSINI_DATABASE_URL"
      - name: Run Playwright (functional)
        working-directory: frontend
        env:
          CI: 'true'
        run: npx playwright test --project=functional
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/

  e2e-multidb:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'multi-db')
    strategy:
      fail-fast: false
      matrix:
        dialect: [postgresql, mysql]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cassini
          POSTGRES_PASSWORD: cassini
          POSTGRES_DB: cassini_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cassini"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: cassini
          MYSQL_USER: cassini
          MYSQL_PASSWORD: cassini
          MYSQL_DATABASE: cassini_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -ucassini -pcassini"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Set DB URL
        id: dburl
        run: |
          case "${{ matrix.dialect }}" in
            postgresql) echo "url=postgresql+asyncpg://cassini:cassini@localhost:5432/cassini_test" >> $GITHUB_OUTPUT ;;
            mysql)      echo "url=mysql+aiomysql://cassini:cassini@localhost:3306/cassini_test"      >> $GITHUB_OUTPUT ;;
          esac
      - name: Seed
        working-directory: backend
        env:
          CASSINI_DATABASE_URL: ${{ steps.dburl.outputs.url }}
        run: python -m cassini.scripts.seed_e2e_unified --db-url "$CASSINI_DATABASE_URL"
      - name: Run Playwright (multi-db-${{ matrix.dialect }})
        working-directory: frontend
        env:
          CI: 'true'
          E2E_DB_DIALECT: ${{ matrix.dialect }}
          CASSINI_DATABASE_URL: ${{ steps.dburl.outputs.url }}
        run: npx playwright test --project=multi-db-${{ matrix.dialect == 'postgresql' && 'pg' || matrix.dialect }}
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.dialect }}
          path: frontend/test-results/

  containerized:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'containerized')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install backend with test-containerized extras
        working-directory: backend
        run: pip install -e ".[dev,test-containerized]"
      - name: Run containerized tests
        working-directory: backend
        run: python -m pytest tests/containerized -m containerized -x
