# Mosquitto broker config for the Cassini test harness.
#
# Two listeners:
#   - 1883: plain TCP, requires username/password (no anonymous).
#   - 8883: TLS, requires username/password and server cert.
#
# Mounted into /mosquitto/config/mosquitto.conf inside the container.
# Companion files (mounted siblings):
#   - /mosquitto/config/passwd       (mosquitto_passwd output, see mosquitto-passwd README)
#   - /mosquitto/certs/ca.crt        (CA cert for TLS — generate locally, see README)
#   - /mosquitto/certs/server.crt    (server cert)
#   - /mosquitto/certs/server.key    (server key)
#
# If the certs directory is empty, the 8883 listener block is still parsed but
# the broker fails fast with a clear error — keep the harness simple by leaving
# the TLS listener enabled so cert misconfiguration is caught at boot time.

# General
persistence false
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
allow_anonymous false
password_file /mosquitto/config/passwd

# Plain TCP listener (auth-only, no TLS)
listener 1883 0.0.0.0
protocol mqtt

# TLS listener
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2
