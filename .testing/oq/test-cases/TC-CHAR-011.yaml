id: TC-CHAR-011
title: "Configure Nelson rules (enable/disable individual rules)"
category: "Characteristic Configuration"
subcategory: "NelsonRules"
priority: critical
regulatory_relevance:
  - "AIAG SPC Manual - Out-of-control detection (Section II)"
  - "ISO 7870-2 Section 7 - Criteria for detecting nonrandom patterns"
preconditions:
  description: "Engineer user is logged in. A variable characteristic exists with all 8 Nelson rules enabled by default."
  seed_method: api
  seed_data:
    plant:
      method: POST
      endpoint: "/plants"
      body:
        name: "OQ Nelson Rules Plant"
        code: "OQNR"
        is_active: true
    department:
      method: POST
      endpoint: "/plants/{plant_id}/hierarchies"
      body:
        name: "NR Dept"
        type: "Area"
    station:
      method: POST
      endpoint: "/hierarchy"
      body:
        parent_id: "{department.id}"
        name: "NR Station"
        type: "Equipment"
    characteristic:
      method: POST
      endpoint: "/characteristics"
      body:
        hierarchy_id: "{station.id}"
        name: "OQ-Nelson-Test"
        subgroup_size: 5
        data_type: "variable"
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Navigate to Configuration, select 'OQ-Nelson-Test' in the tree."
    verify: "Config panel opens."
    screenshot: false
  - step: 2
    action: "Open the Rules tab."
    verify: "All 8 Nelson rules are listed with descriptions. By default, all 8 are enabled (checked)."
    screenshot: true
  - step: 3
    action: "Disable Rule 3 (N points trending), Rule 4 (N points alternating), Rule 5 (M of N beyond 2-sigma), Rule 6 (M of N beyond 1-sigma), Rule 7 (N within 1-sigma), and Rule 8 (N beyond 1-sigma)."
    verify: "Only Rule 1 (point beyond 3-sigma) and Rule 2 (N same side of center) remain enabled."
    screenshot: true
  - step: 4
    action: "Click Save."
    verify: "Save completes. Success notification."
    screenshot: false
  - step: 5
    action: "Refresh the browser page (F5). Navigate back to 'OQ-Nelson-Test', open Rules tab."
    verify: "After refresh, only Rule 1 and Rule 2 are enabled. Rules 3-8 remain disabled."
    screenshot: true
expected_result: "Individual Nelson rules can be toggled on/off and the configuration persists."
pass_criteria: "Rules 1 and 2 are enabled; rules 3-8 are disabled -- both before and after page refresh."
cleanup:
  - "Delete characteristic, hierarchy nodes, and plant via API"
