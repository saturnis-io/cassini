id: TC-CHAR-007
title: "Create CUSUM characteristic"
category: "Characteristic Configuration"
subcategory: "ChartType"
priority: high
regulatory_relevance:
  - "ISO 7871 - Cumulative sum charts"
  - "AIAG SPC Manual - Appendix (CUSUM overview)"
preconditions:
  description: "Engineer user is logged in. A station node exists."
  seed_method: api
  seed_data:
    plant:
      method: POST
      endpoint: "/plants"
      body:
        name: "OQ CUSUM Plant"
        code: "OQCU"
        is_active: true
    department:
      method: POST
      endpoint: "/plants/{plant_id}/hierarchies"
      body:
        name: "CUSUM Dept"
        type: "Area"
    station:
      method: POST
      endpoint: "/hierarchy"
      body:
        parent_id: "{department.id}"
        name: "CUSUM Station"
        type: "Equipment"
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Navigate to Configuration, select 'CUSUM Station'."
    verify: "Station node selected."
    screenshot: false
  - step: 2
    action: "Click 'Add Characteristic'. Enter: Name: 'OQ-CUSUM-Viscosity', Data Type: Variable, Chart Type: CUSUM, Subgroup Size: 1."
    verify: "CUSUM-specific fields appear: Target (process mean), k (slack value), h (decision interval)."
    screenshot: true
  - step: 3
    action: "Enter CUSUM parameters: Target: 50.0, k: 0.5, h: 5.0."
    verify: "CUSUM parameters accepted."
    screenshot: true
  - step: 4
    action: "Click Create/Save."
    verify: "Characteristic created."
    screenshot: false
  - step: 5
    action: "Open config panel for 'OQ-CUSUM-Viscosity'."
    verify: "Config shows: Chart Type = CUSUM, cusum_target = 50.0, cusum_k = 0.5, cusum_h = 5.0."
    screenshot: true
expected_result: "A CUSUM characteristic is created with the correct target, slack value (k), and decision interval (h) parameters."
pass_criteria: "Characteristic shows chart_type=cusum with cusum_target=50.0, cusum_k=0.5, cusum_h=5.0."
cleanup:
  - "Delete characteristic, hierarchy nodes, and plant via API"
