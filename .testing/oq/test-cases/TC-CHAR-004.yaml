id: TC-CHAR-004
title: "Create np-chart characteristic"
category: "Characteristic Configuration"
subcategory: "ChartType"
priority: high
regulatory_relevance:
  - "AIAG SPC Manual - np Chart (Section III)"
  - "ISO 7870-1 - Attribute control charts"
preconditions:
  description: "Engineer user is logged in. A station node exists."
  seed_method: api
  seed_data:
    plant:
      method: POST
      endpoint: "/plants"
      body:
        name: "OQ NP-Chart Plant"
        code: "OQNP"
        is_active: true
    department:
      method: POST
      endpoint: "/plants/{plant_id}/hierarchies"
      body:
        name: "NP Dept"
        type: "Area"
    station:
      method: POST
      endpoint: "/hierarchy"
      body:
        parent_id: "{department.id}"
        name: "NP Station"
        type: "Equipment"
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Navigate to Configuration, select 'NP Station'."
    verify: "Station node selected."
    screenshot: false
  - step: 2
    action: "Click 'Add Characteristic'. Enter: Name: 'OQ-Reject-Count', Data Type: Attribute, Attribute Chart Type: np (number defective), Default Sample Size: 50."
    verify: "np chart type is selectable under Attribute data type."
    screenshot: true
  - step: 3
    action: "Click Create/Save."
    verify: "Characteristic created."
    screenshot: false
  - step: 4
    action: "Open config panel for 'OQ-Reject-Count'."
    verify: "Config shows: Data Type = Attribute, Attribute Chart Type = np, Default Sample Size = 50."
    screenshot: true
expected_result: "An np-chart (number defective) attribute characteristic is created with fixed sample size."
pass_criteria: "Characteristic shows data_type=attribute, attribute_chart_type=np, default_sample_size=50."
cleanup:
  - "Delete characteristic, hierarchy nodes, and plant via API"
