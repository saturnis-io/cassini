id: TC-SIG-012
title: "Wrong password fails signature"
category: "Electronic Signatures"
subcategory: "Security"
priority: critical
regulatory_relevance:
  - "21 CFR Part 11 Section 11.300(b) - Ensure that identification codes and passwords are periodically checked and that unauthorized use is detected"
  - "21 CFR Part 11 Section 11.200(a)(1) - Signing requires authentication of signer's identity"
  - "ISO 27001 Annex A.9.4.2 - Secure log-on procedures"
preconditions:
  description: >
    An engineer user is logged in. A signature meaning 'reviewed' exists for
    the plant. A signable resource exists. The user knows their CORRECT
    password but will intentionally enter an INCORRECT one.
  seed_method: api
  seed_data:
    plant: "OQ-Plant-Signatures"
    user:
      username: "oq-engineer"
      password: "TestPass123!"
      role: "engineer"
    meaning:
      code: "reviewed"
      display_name: "Reviewed"
    resource:
      type: "capability_snapshot"
      id: 1
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Navigate to a signable resource and click the 'Sign' button to open the SignatureDialog"
    verify: "The SignatureDialog opens with password field, meaning selector, and Sign button."
    screenshot: true
  - step: 2
    action: "Enter an INCORRECT password: 'WrongPassword999'. Select meaning 'Reviewed'. Click 'Sign'."
    verify: "An error message appears in the dialog indicating authentication failed (e.g., 'Invalid password' or 'Authentication failed'). The dialog does NOT close. The Sign button is re-enabled for retry."
    screenshot: true
  - step: 3
    action: "Verify that NO signature was created via API: GET /signatures/resource/capability_snapshot/1"
    verify: "The response does not include any new signature record since the failed attempt. The total count of signatures for this resource is the same as before the failed attempt."
    screenshot: false
  - step: 4
    action: "Now enter the CORRECT password: 'TestPass123!'. Select meaning 'Reviewed'. Click 'Sign'."
    verify: "Success notification appears. The dialog closes. The signature is created successfully."
    screenshot: true
  - step: 5
    action: "Verify via API: GET /signatures/resource/capability_snapshot/1"
    verify: "A new signature record exists with username='oq-engineer', meaning_code='reviewed', is_valid=true. Only one new signature exists (the successful one), not the failed attempt."
    screenshot: false
expected_result: >
  An incorrect password causes the signature to fail with a clear error
  message. No signature record is created for the failed attempt. The
  dialog remains open for retry. A subsequent attempt with the correct
  password succeeds normally.
pass_criteria: >
  Wrong password produces an error message, not a success. No signature record
  is created for the failed attempt. The dialog stays open. Correct password
  on retry creates the signature successfully. Only one signature record exists
  after the test (the successful one).
cleanup:
  - "No cleanup required -- the successful signature is an immutable record"
