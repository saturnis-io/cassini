id: TC-VIOL-008
title: "Nelson Rule 8 -- 8 consecutive points beyond 1 sigma on both sides"
category: "Violations & Rules"
subcategory: "NelsonRule8"
priority: high
regulatory_relevance:
  - "ISO 7870-2 - Control Charts, Rule 8 (mixture pattern)"
  - "AIAG SPC Reference Manual - Supplementary run tests"
preconditions:
  description: "A variable characteristic (I-MR, subgroup_size=1) exists with all 8 Nelson rules enabled. 20 in-control samples have been submitted and control limits calculated. Sigma is approximately 0.015. The 1-sigma boundaries are approximately 10.015 (upper) and 9.985 (lower). The logged-in user has operator role or higher."
  seed_method: api
  seed_data:
    characteristic:
      name: "OQ-VIOL-Rule8"
      chart_type: null
      subgroup_size: 1
      data_type: "variable"
      usl: 10.10
      lsl: 9.90
      target_value: 10.0
    samples:
      count: 20
      values_description: "20 samples from a normal distribution around 10.0 with sigma approximately 0.015. Example values: 10.01, 9.99, 10.005, 9.995, 10.01, 9.99, 10.015, 9.985, 10.005, 10.00, 9.995, 10.01, 9.99, 10.005, 9.995, 10.01, 9.985, 10.015, 10.00, 10.005. After submission, recalculate control limits."
    post_seed:
      - "Recalculate control limits via POST /characteristics/{id}/recalculate-limits"
      - "Note the sigma value and 1-sigma boundary positions"
      - "Verify no Rule 8 violations exist"
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Determine the 1-sigma boundary. Navigate to /data-entry. Select 'OQ-VIOL-Rule8'. Submit 8 consecutive samples that all fall beyond 1 sigma from the centerline, alternating between above and below. If sigma is 0.015, submit values beyond 10.015 (upper side) and below 9.985 (lower side), alternating: 10.03 (above 1-sigma), 9.97 (below 1-sigma), 10.025 (above), 9.975 (below), 10.03 (above), 9.97 (below), 10.025 (above), 9.975 (below). Submit each individually."
    verify: "On the 8th consecutive point outside Zone C (all beyond 1 sigma, on both sides), the response includes a violation with rule_id=8. The notification indicates mixture or bimodal distribution."
    screenshot: true
  - step: 2
    action: "Navigate to /violations."
    verify: "A violation exists for 'OQ-VIOL-Rule8' with rule_id=8 and severity='WARNING'. The rule_name indicates mixture or bimodal pattern."
    screenshot: true
  - step: 3
    action: "Navigate to /dashboard and select 'OQ-VIOL-Rule8'."
    verify: "The chart shows 8 consecutive points all outside Zone C, alternating between upper and lower sides. Zone C (around the centerline) is conspicuously empty for these 8 points. A WARNING marker is visible."
    screenshot: false
expected_result: "Submitting 8 consecutive points all beyond 1 sigma from centerline on both sides triggers a Nelson Rule 8 violation with WARNING severity, indicating a mixture of two populations (bimodal distribution)."
pass_criteria: "Rule 8 violation is created with rule_id=8 and severity=WARNING. The violation triggers on the 8th consecutive point outside Zone C. Points alternate between upper and lower extremes."
cleanup:
  - "Delete characteristic 'OQ-VIOL-Rule8' and all associated data via API"
