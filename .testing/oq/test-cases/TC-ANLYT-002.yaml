id: TC-ANLYT-002
title: "Create multivariate chart group"
category: "Advanced Analytics"
subcategory: "Multivariate"
priority: critical
regulatory_relevance:
  - "ISO 9001:2015 Section 9.1.3 - Analysis and evaluation of data"
  - "AIAG SPC Manual Section IV - Multivariate methods for correlated quality characteristics"
preconditions:
  description: >
    An engineer user is logged in. The active plant has at least 2
    variable-data characteristics with data. These characteristics will
    serve as members of the multivariate group.
  seed_method: api
  seed_data:
    plant:
      method: POST
      endpoint: "/plants"
      body:
        name: "OQ Analytics Plant"
        code: "OQAN"
        is_active: true
    department:
      method: POST
      endpoint: "/plants/{plant_id}/hierarchies"
      body:
        name: "Analytics Dept"
        type: "Area"
    line:
      method: POST
      endpoint: "/hierarchy"
      body:
        parent_id: "{department.id}"
        name: "Analytics Line"
        type: "Line"
    station:
      method: POST
      endpoint: "/hierarchy"
      body:
        parent_id: "{line.id}"
        name: "Analytics Station"
        type: "Equipment"
    characteristic_1:
      method: POST
      endpoint: "/characteristics"
      body:
        name: "OQ-Diameter-MV"
        hierarchy_id: "{station.id}"
        chart_type: "i_mr"
        subgroup_size: 1
        data_type: "variable"
        usl: 10.10
        lsl: 9.90
        target: 10.00
    characteristic_2:
      method: POST
      endpoint: "/characteristics"
      body:
        name: "OQ-Length-MV"
        hierarchy_id: "{station.id}"
        chart_type: "i_mr"
        subgroup_size: 1
        data_type: "variable"
        usl: 50.5
        lsl: 49.5
        target: 50.00
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Switch to 'OQ Analytics Plant' and navigate to /analytics?tab=multivariate."
    verify: "Multivariate tab loads with the Group Manager panel. If no groups exist yet, an empty state or 'No groups' message is shown."
    screenshot: true
  - step: 2
    action: "Click 'New Group' (or equivalent create button) in the Group Manager."
    verify: "A group creation form or dialog appears with fields for name, chart type, and characteristic selection."
    screenshot: true
  - step: 3
    action: "Enter 'OQ-Multivariate' as the group name. Select 'T-squared' as the chart type. Leave alpha at the default (0.05)."
    verify: "Group name field shows 'OQ-Multivariate'. Chart type is set to T-squared. Alpha shows 0.05."
    screenshot: false
  - step: 4
    action: "Add 'OQ-Diameter-MV' and 'OQ-Length-MV' as member characteristics."
    verify: "Both characteristics appear in the member list with their names displayed."
    screenshot: true
  - step: 5
    action: "Click Create/Save to create the group."
    verify: "Success indication (toast or inline message). The group 'OQ-Multivariate' appears in the group list with 2 members, chart type T-squared."
    screenshot: true
expected_result: "A multivariate chart group named 'OQ-Multivariate' is created with T-squared chart type, containing two characteristics (OQ-Diameter-MV and OQ-Length-MV) as members."
pass_criteria: "Group creation succeeds. Group appears in the list. API verification: GET /multivariate/groups?plant_id={plant_id} returns a group with name='OQ-Multivariate', chart_type='t_squared', and 2 members."
cleanup:
  - "Delete multivariate group via API: DELETE /multivariate/groups/{group_id}"
  - "Delete characteristics via API: DELETE /characteristics/{id}"
  - "Delete hierarchy nodes and plant via API"
