id: TC-AUDIT-003
title: "Audit trail captures PUT/PATCH (update) operations"
category: "Audit Trail & Retention"
subcategory: "AuditLog"
priority: critical
regulatory_relevance:
  - "21 CFR Part 11 - Record modifications must be traceable (who changed what, when)"
  - "ISO 9001:2015 Section 7.5.3 - Control of documented information changes"
  - "IATF 16949 - Change control for quality records"
preconditions:
  description: >
    An engineer or admin user exists. A characteristic named 'OQ-Audit-Update-Test'
    exists under a known hierarchy node. The characteristic can be edited
    via the configuration page.
  seed_method: api
  seed_data:
    plant: "OQ-Plant-Audit"
    department: "Quality"
    line: "Inspection-Line-1"
    characteristic:
      name: "OQ-Audit-Update-Test"
      chart_type: "i_mr"
      subgroup_size: 1
      data_type: "variable"
      usl: 10.10
      lsl: 9.90
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Log in as engineer or admin and navigate to /configuration"
    verify: "Configuration page loads with hierarchy tree"
    screenshot: false
  - step: 2
    action: "Select the 'OQ-Audit-Update-Test' characteristic in the hierarchy tree"
    verify: "The characteristic detail panel loads showing current name and settings"
    screenshot: false
  - step: 3
    action: "Change the characteristic name to 'OQ-Audit-Updated-Name' and save"
    verify: "Success toast appears. The hierarchy tree updates to show the new name."
    screenshot: true
  - step: 4
    action: "Navigate to /settings/audit-log"
    verify: "Audit log viewer loads"
    screenshot: false
  - step: 5
    action: "Look for the most recent entries in the audit log"
    verify: >
      An 'Update' action entry is visible for resource type 'Characteristic'.
      The entry shows: the current user's username, action 'Update', resource
      type 'Characteristic', and a resource ID matching the updated
      characteristic. The timestamp is within the last few minutes.
    screenshot: true
expected_result: >
  Updating a characteristic's name generates an audit trail entry with
  action 'update', resource type 'characteristic', attributed to the
  logged-in user with a recent timestamp.
pass_criteria: >
  The audit log contains an 'update' entry for the characteristic with the
  correct username and resource ID. API verification:
  GET /audit/logs?action=update&resource_type=characteristic returns a
  recent entry matching the updated resource.
cleanup:
  - "Delete the characteristic 'OQ-Audit-Updated-Name' via API: DELETE /characteristics/{id}"
