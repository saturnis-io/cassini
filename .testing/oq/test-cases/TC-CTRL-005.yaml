id: TC-CTRL-005
title: "np-chart renders with count nonconforming data"
category: "Control Charts"
subcategory: "AttributeCharts"
priority: high
regulatory_relevance:
  - "AIAG SPC Reference Manual - np-Chart (Number Nonconforming)"
  - "ISO 9001:2015 Section 9.1.3 - Analysis and Evaluation"

preconditions:
  description: >
    An np-chart characteristic must exist with fixed sample size
    (e.g., n=100 per inspection) and at least 25 attribute samples.
    Control limits should be calculated.
  seed_method: api
  seed_data:
    plant: "OQ-Plant-Ctrl"
    department: "Assembly"
    line: "QC-Station-1"
    characteristic:
      name: "Defective Count np"
      chart_type: "np"
      subgroup_size: 100
      data_type: "attribute"
    samples: >
      25 attribute samples with fixed sample_size=100 and defect
      counts averaging ~5 per subgroup (5% defective rate).
    post_seed: "POST /characteristics/{id}/recalculate-limits"

execution_mode: ui
ui_proof_frequency: major-release

steps:
  - step: 1
    action: "Navigate to /dashboard and select Defective Count np"
    verify: >
      np-chart renders showing 25 data points. Each point plots the raw
      defective count (integer values). Center line shows np-bar.
    screenshot: true
  - step: 2
    action: "Inspect the control limit lines"
    verify: >
      UCL and LCL are straight horizontal lines (fixed sample size
      means constant limits):
      np-bar = sum(defectives) / k (where k = number of subgroups)
      p-bar = np-bar / n
      UCL = np-bar + 3 * sqrt(np-bar * (1 - p-bar))
      LCL = np-bar - 3 * sqrt(np-bar * (1 - p-bar)) (may be 0)
    screenshot: true
  - step: 3
    action: "Hover over a data point"
    verify: "Tooltip shows: defective count (integer), timestamp"
    screenshot: true

expected_result: >
  The np-chart correctly plots count nonconforming with constant
  control limits (sample size is fixed). The Y-axis shows integer
  defective counts, not proportions. This chart is appropriate when
  all subgroups have the same sample size.

pass_criteria: >
  Chart shows 25 points with straight UCL/CL/LCL lines. Y-axis
  values are integers. UCL > np-bar > LCL >= 0.

cleanup:
  - "Delete seeded data via API"
