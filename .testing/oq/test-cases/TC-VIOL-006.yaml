id: TC-VIOL-006
title: "Nelson Rule 6 -- 4 of 5 consecutive points beyond 1 sigma"
category: "Violations & Rules"
subcategory: "NelsonRule6"
priority: high
regulatory_relevance:
  - "ISO 7870-2 - Control Charts, Rule 6 (Zone B test)"
  - "AIAG SPC Reference Manual - Supplementary run tests"
preconditions:
  description: "A variable characteristic (I-MR, subgroup_size=1) exists with all 8 Nelson rules enabled. 20 in-control samples have been submitted and control limits calculated. Sigma is approximately 0.015, so 1-sigma boundary is approximately 0.015 from centerline (at approximately 10.015 and 9.985). The logged-in user has operator role or higher."
  seed_method: api
  seed_data:
    characteristic:
      name: "OQ-VIOL-Rule6"
      chart_type: null
      subgroup_size: 1
      data_type: "variable"
      usl: 10.10
      lsl: 9.90
      target_value: 10.0
    samples:
      count: 20
      values_description: "20 tightly distributed samples around 10.0 with sigma approximately 0.015. Example values: 10.01, 9.99, 10.005, 9.995, 10.01, 9.985, 10.015, 9.99, 10.005, 10.00, 9.995, 10.01, 9.99, 10.005, 9.995, 10.01, 9.99, 10.005, 10.00, 9.995. After submission, recalculate control limits."
    post_seed:
      - "Recalculate control limits via POST /characteristics/{id}/recalculate-limits"
      - "Note the sigma value to identify the 1-sigma boundary"
      - "Verify no Rule 6 violations exist"
execution_mode: ui
ui_proof_frequency: major-release
steps:
  - step: 1
    action: "Determine the 1-sigma boundary from the chart data (CL + 1*sigma). Navigate to /data-entry. Select 'OQ-VIOL-Rule6'. Submit 5 consecutive samples where 4 of the 5 are beyond 1 sigma on the same side (upper). For example, if sigma is 0.015 and CL is 10.0, submit: 10.025 (beyond 1-sigma), 10.02 (beyond 1-sigma), 10.03 (beyond 1-sigma), 10.005 (within 1-sigma, the 'normal' one in the group), 10.025 (beyond 1-sigma, completing the 4-of-5 pattern). Submit each individually."
    verify: "After the 5th sample completes the 4-of-5 pattern, the response includes a violation with rule_id=6. The notification indicates a Zone B test or '4 of 5 beyond 1 sigma'."
    screenshot: true
  - step: 2
    action: "Navigate to /violations."
    verify: "A violation exists for 'OQ-VIOL-Rule6' with rule_id=6 and severity='WARNING'. The rule_name indicates the zone B test or 4-of-5 pattern."
    screenshot: true
  - step: 3
    action: "Navigate to /dashboard and select 'OQ-VIOL-Rule6'."
    verify: "The chart shows the 4 points beyond the 1-sigma zone. A WARNING marker is visible."
    screenshot: false
expected_result: "Submitting a 4-of-5 pattern beyond the 1-sigma zone on the same side triggers a Nelson Rule 6 violation with WARNING severity, indicating a small developing shift."
pass_criteria: "Rule 6 violation is created with rule_id=6 and severity=WARNING. The pattern is correctly detected as 4 of 5 consecutive points beyond Zone B on the same side."
cleanup:
  - "Delete characteristic 'OQ-VIOL-Rule6' and all associated data via API"
