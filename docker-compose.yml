services:
  openspc:
    build: .
    ports:
      - "${OPENSPC_PORT:-8000}:8000"
    environment:
      - OPENSPC_DATABASE_URL=postgresql+asyncpg://openspc:openspc@postgres:5432/openspc
      - OPENSPC_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENSPC_HOST=0.0.0.0
      - OPENSPC_PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - openspc-data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=openspc
      - POSTGRES_PASSWORD=openspc
      - POSTGRES_DB=openspc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openspc"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  openspc-data:
  postgres-data:
